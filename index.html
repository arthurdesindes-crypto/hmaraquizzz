<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HmaraQuizz 😂</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --accent: #c0392b;
    --accent2: #8e44ad;
    --text: #e8e8f0;
    --muted: #555570;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(142,68,173,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  #app {
    width: 100%;
    max-width: 680px;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  /* TITLE */
  .site-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    text-align: center;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(192,57,43,0.6), 0 0 60px rgba(192,57,43,0.3);
    letter-spacing: 4px;
    margin-bottom: 0.3rem;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.4; }
    99% { opacity: 1; }
  }

  .site-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  /* QUESTION CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .question-num {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.7rem;
  }

  .question-text {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 1.8rem;
    color: var(--text);
  }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
  }

  .option-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: left;
    letter-spacing: 0.5px;
  }

  .option-btn:hover {
    background: rgba(192,57,43,0.1);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(192,57,43,0.2);
  }

  .option-btn.correct {
    background: rgba(39,174,96,0.15);
    border-color: #27ae60;
    color: #2ecc71;
  }

  .option-btn.wrong {
    background: rgba(192,57,43,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  .option-btn:disabled {
    cursor: default;
    transform: none;
  }

  /* SCORE SCREEN */
  .score-screen {
    text-align: center;
  }

  .score-big {
    font-family: 'Creepster', cursive;
    font-size: 5rem;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(192,57,43,0.5);
    line-height: 1;
    margin: 1rem 0;
  }

  .score-label {
    font-size: 0.8rem;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .score-msg {
    font-size: 1.1rem;
    margin: 1.5rem 0 2rem;
    color: var(--text);
    opacity: 0.8;
  }

  .restart-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 1rem 2.5rem;
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: #a93226;
    transform: scale(1.03);
  }

  /* SCREAMER OVERLAY */
  #screamer {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    background: black;
  }

  #screamer.active {
    display: flex;
    animation: screamShake 3.5s ease;
  }

  #screamer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: contrast(2.2) brightness(0.75) saturate(0.3) sepia(0.6) hue-rotate(-20deg) drop-shadow(0 0 30px rgba(255,0,0,0.9));
    animation: zoomPulse 3.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes zoomPulse {
    0%   { transform: scale(0.6) translateY(60px); opacity: 0; }
    8%   { transform: scale(1.5) translateY(-30px); opacity: 1; }
    15%  { transform: scale(1.1) translateY(0px); }
    25%  { transform: scale(1.35) translateY(-15px); }
    35%  { transform: scale(1.05) translateY(5px); }
    50%  { transform: scale(1.25) translateY(-10px); }
    65%  { transform: scale(1.08) translateY(3px); }
    80%  { transform: scale(1.18) translateY(-6px); }
    100% { transform: scale(1.0) translateY(0); }
  }

  /* Red vignette overlay */
  #screamer::before {
    content: \'\';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(180,0,0,0.75) 100%);
    z-index: 2;
    pointer-events: none;
    animation: vignetteFlicker 3.5s ease;
  }

  @keyframes vignetteFlicker {
    0%,100% { opacity: 1; }
    25% { opacity: 0.7; }
    50% { opacity: 1; }
    75% { opacity: 0.5; }
  }

  /* Glitch scanlines */
  #screamer::after {
    content: \'\';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 6px
    );
    z-index: 3;
    pointer-events: none;
    animation: scanMove 0.08s linear infinite;
  }

  @keyframes scanMove {
    from { background-position: 0 0; }
    to { background-position: 0 4px; }
  }

  @keyframes screamShake {
    0%   { transform: translate(0,0) rotate(0deg); }
    5%   { transform: translate(-14px, -10px) rotate(-3deg); }
    10%  { transform: translate(14px, 10px) rotate(3deg); }
    15%  { transform: translate(-12px, 8px) rotate(-2deg); }
    20%  { transform: translate(12px, -8px) rotate(2deg); }
    25%  { transform: translate(-10px, 10px) rotate(-3deg); }
    30%  { transform: translate(10px, -10px) rotate(3deg); }
    40%  { transform: translate(-6px, 6px) rotate(-1deg); }
    50%  { transform: translate(6px, -6px) rotate(1deg); }
    60%  { transform: translate(-4px, 4px) rotate(-1deg); }
    70%  { transform: translate(4px, -4px) rotate(0deg); }
    85%  { transform: translate(-2px, 2px) rotate(0deg); }
    100% { transform: translate(0,0) rotate(0deg); }
  }

  /* Flash overlay */
  .flash {
    position: fixed;
    inset: 0;
    background: red;
    z-index: 8888;
    opacity: 0;
    pointer-events: none;
    animation: flashAnim 0.15s ease;
  }

  @keyframes flashAnim {
    0%   { opacity: 0.9; }
    100% { opacity: 0; }
  }

  .hidden { display: none !important; }

  /* CELEBRATION */
  #celebration {
    position: fixed;
    inset: 0;
    z-index: 8000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }

  #celebration.hidden { display: none !important; }

  #photo-carousel {
    position: absolute;
    inset: 0;
  }

  #carousel-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(1.1) saturate(1.3) contrast(1.05);
    transition: opacity 0.25s ease;
  }

  #carousel-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.55));
  }

  #confetti-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    top: -20px;
    width: 12px;
    height: 12px;
    border-radius: 2px;
    animation: confettiFall linear infinite;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  #celebration-text {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 2rem;
    animation: celebIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  @keyframes celebIn {
    from { transform: scale(0.5) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  #cel-title {
    font-family: 'Creepster', cursive;
    font-size: clamp(2.5rem, 10vw, 5rem);
    color: #fff;
    text-shadow: 0 0 20px rgba(255,220,0,0.8), 0 0 60px rgba(255,150,0,0.5);
    letter-spacing: 3px;
    animation: titlePulse 0.8s ease infinite alternate;
    margin-bottom: 1rem;
  }

  @keyframes titlePulse {
    from { text-shadow: 0 0 20px rgba(255,220,0,0.8), 0 0 60px rgba(255,150,0,0.5); }
    to   { text-shadow: 0 0 40px rgba(255,220,0,1), 0 0 100px rgba(255,150,0,0.8); }
  }

  #cel-score {
    font-size: 1.3rem;
    color: rgba(255,255,255,0.9);
    margin-bottom: 2rem;
    letter-spacing: 2px;
  }

</style>
</head>

<!-- SCREAMER OVERLAY -->
<div id="screamer">
  <img id="screamer-img" src="" alt="">
</div>

<div id="app">
  <!-- QUIZ SCREEN -->

  </div>

  <!-- CELEBRATION OVERLAY -->
  <div id="celebration" class="hidden">
    <div id="confetti-container"></div>
    <div id="photo-carousel">
      <img id="carousel-img" src="" alt="">
      <div id="carousel-overlay"></div>
    </div>
    <div id="celebration-text">
      <h2 id="cel-title">BRAVO LES POTES 🎉</h2>
      <p id="cel-score"></p>
      <button class="restart-btn" onclick="endCelebration()">Voir mon score 🏆</button>
    </div>
  </div>

  <!-- SCORE SCREEN -->
  <div id="score-screen" class="hidden">
    <div class="card score-screen">
      <p class="score-label">Score final</p>

      <p class="score-msg" id="score-msg"></p>
      <button class="restart-btn" onclick="startQuiz()">Rejouer 🔁</button>
    </div>
  </div>
</div>

let current = 0;
let score = 0;
let answered = false;


function startCelebration(finalScore, totalQ) {
  document.getElementById('celebration').classList.remove('hidden');
  document.getElementById('cel-score').textContent = finalScore + ' / ' + totalQ + ' bonnes réponses !';

  // Confetti
  const container = document.getElementById('confetti-container');
  const colors = ['#ff4444','#ffcc00','#44ff88','#4488ff','#ff44cc','#ff8800','#ffffff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (8 + Math.random() * 14) + 'px';
    el.style.height = (8 + Math.random() * 14) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = (Math.random() * 3) + 's';
    container.appendChild(el);
  }

  // Photo carousel
  let idx = Math.floor(Math.random() * SCREAMER_IMAGES.length);
  const imgEl = document.getElementById('carousel-img');
  imgEl.src = SCREAMER_IMAGES[idx];

  window._carouselInterval = setInterval(() => {
    imgEl.style.opacity = '0';
    setTimeout(() => {
      idx = (idx + 1) % SCREAMER_IMAGES.length;
      imgEl.src = SCREAMER_IMAGES[idx];
      imgEl.style.opacity = '1';
    }, 250);
  }, 800);

  // Joyful music
  playCelebrationMusic();
}

function endCelebration() {
  clearInterval(window._carouselInterval);
  stopCelebrationMusic();
  document.getElementById('celebration').classList.add('hidden');
  document.getElementById('confetti-container').innerHTML = '';
  showScore();
}

let _celebCtx = null;
let _celebNodes = [];

function playCelebrationMusic() {
  try {
    _celebCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _celebCtx;
    _celebNodes = [];

    // Happy melody — C major, 3 phrases repeated with variation
    const phrase1 = [523, 587, 659, 784, 880, 784, 659, 587,
                     523, 659, 784, 880, 988, 880, 784, 659];
    const phrase2 = [784, 880, 988, 1047, 988, 880, 784, 659,
                     659, 784, 880, 784, 659, 587, 523, 587];
    const phrase3 = [659, 784, 880, 988, 1047, 988, 880, 784,
                     523, 659, 784, 659, 587, 523, 587, 523];
    const phrase4 = [523, 587, 659, 784, 659, 587, 523, 494,
                     523, 659, 784, 880, 784, 659, 784, 523];
    const notes = [...phrase1, ...phrase2, ...phrase3, ...phrase4];
    const noteDur = 0.17;

    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * noteDur;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      gain.gain.setValueAtTime(0.18, t + noteDur - 0.04);
      gain.gain.linearRampToValueAtTime(0, t + noteDur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + noteDur);
      _celebNodes.push(osc);
    });

    // Harmony layer (thirds above)
    const harmony = [...phrase1, ...phrase2, ...phrase3, ...phrase4].map(f => f * 1.25);
    harmony.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * noteDur;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.07, t + 0.02);
      gain.gain.setValueAtTime(0.07, t + noteDur - 0.04);
      gain.gain.linearRampToValueAtTime(0, t + noteDur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + noteDur);
      _celebNodes.push(osc);
    });

    // Bass oom-pah (64 beats)
    const bassBase = [262, 262, 294, 294, 330, 330, 349, 349,
                      330, 330, 294, 294, 330, 330, 294, 294];
    const bassNotes = [...bassBase, ...bassBase, ...bassBase, ...bassBase];
    bassNotes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * noteDur;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.09, t + 0.01);
      gain.gain.linearRampToValueAtTime(0, t + noteDur * 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + noteDur);
      _celebNodes.push(osc);
    });

    // Percussion clicks (64 beats)
    for (let i = 0; i < 64; i++) {
      if (i % 2 === 0) {
        const bufSize = ctx.sampleRate * 0.05;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const dat = buf.getChannelData(0);
        for (let j = 0; j < bufSize; j++) dat[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufSize * 0.2));
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const g = ctx.createGain();
        g.gain.value = 0.12;
        src.connect(g); g.connect(ctx.destination);
        src.start(ctx.currentTime + i * noteDur);
        _celebNodes.push(src);
      }
    }
  } catch(e) {}
}

function stopCelebrationMusic() {
  try {
    if (_celebCtx) { _celebCtx.close(); _celebCtx = null; }
    _celebNodes = [];
  } catch(e) {}
}

function startQuiz() {
  current = 0;
  score = 0;
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('score-screen').classList.add('hidden');
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  document.getElementById('progress-fill').style.width = ((current / total) * 100) + '%';
  document.getElementById('question-num').textContent = `QUESTION ${current + 1} / ${total}`;
  document.getElementById('question-text').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => handleAnswer(i, btn);
    optDiv.appendChild(btn);
  });
}

function handleAnswer(index, btn) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[current];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);

  if (index === q.answer) {
    btn.classList.add('correct');
    score++;
    setTimeout(nextQuestion, 1000);
  } else {
    btn.classList.add('wrong');
    triggerScreamer(() => {
      // Re-enable remaining buttons for retry, keep wrong one disabled
      allBtns.forEach(b => {
        b.classList.remove('correct');
        if (b === btn) {
          b.disabled = true;
          b.classList.add('wrong');
        } else {
          b.disabled = false;
          b.classList.remove('wrong');
        }
      });
      answered = false;
    });
  }
}

function triggerScreamer(callback) {
  // Flash
  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 200);

  // Pick random image
  const img = SCREAMER_IMAGES[Math.floor(Math.random() * SCREAMER_IMAGES.length)];
  const el = document.getElementById('screamer');
  const imgEl = document.getElementById('screamer-img');
  imgEl.src = img;

  // Play scream sound
  playScream();

  el.classList.add('active');
  document.body.style.animation = 'screamShake 0.6s ease';

  setTimeout(() => {
    el.classList.remove('active');
    document.body.style.animation = '';
    if (callback) callback();
  }, 3500);
}

function playScream() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 3.5;
    const end = ctx.currentTime + dur;
    const fadeStart = end - 0.3;

    function flatGain(gainNode, vol) {
      gainNode.gain.setValueAtTime(vol, ctx.currentTime);
      gainNode.gain.setValueAtTime(vol, fadeStart);
      gainNode.gain.linearRampToValueAtTime(0, end);
    }

    // Layer 1: Sawtooth growl — stays loud
    const osc1 = ctx.createOscillator();
    const gain1 = ctx.createGain();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(90, ctx.currentTime);
    osc1.frequency.setValueAtTime(70, ctx.currentTime + 1.0);
    osc1.frequency.setValueAtTime(90, ctx.currentTime + 2.0);
    osc1.frequency.setValueAtTime(60, ctx.currentTime + 3.0);
    flatGain(gain1, 0.45);
    osc1.connect(gain1); gain1.connect(ctx.destination);
    osc1.start(); osc1.stop(end);

    // Layer 2: Shriek — stays loud, oscillates pitch
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(1100, ctx.currentTime);
    osc2.frequency.setValueAtTime(800, ctx.currentTime + 0.4);
    osc2.frequency.setValueAtTime(1300, ctx.currentTime + 1.0);
    osc2.frequency.setValueAtTime(700, ctx.currentTime + 1.8);
    osc2.frequency.setValueAtTime(1000, ctx.currentTime + 2.5);
    osc2.frequency.setValueAtTime(600, ctx.currentTime + 3.2);
    flatGain(gain2, 0.3);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.start(); osc2.stop(end);

    // Layer 3: Demon moan — constant
    const osc3 = ctx.createOscillator();
    const gain3 = ctx.createGain();
    osc3.type = 'triangle';
    osc3.frequency.setValueAtTime(200, ctx.currentTime);
    osc3.frequency.setValueAtTime(160, ctx.currentTime + 0.8);
    osc3.frequency.setValueAtTime(230, ctx.currentTime + 1.6);
    osc3.frequency.setValueAtTime(180, ctx.currentTime + 2.4);
    flatGain(gain3, 0.28);
    osc3.connect(gain3); gain3.connect(ctx.destination);
    osc3.start(); osc3.stop(end);

    // Layer 4: Full-duration noise (not just a burst)
    const bufSize = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const dat = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) dat[i] = (Math.random() * 2 - 1);
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const gainN = ctx.createGain();
    flatGain(gainN, 0.55);
    noise.connect(gainN); gainN.connect(ctx.destination);
    noise.start(); noise.stop(end);

    // Layer 5: Sub-bass rumble constant
    const bufSize2 = ctx.sampleRate * dur;
    const buf2 = ctx.createBuffer(1, bufSize2, ctx.sampleRate);
    const dat2 = buf2.getChannelData(0);
    for (let i = 0; i < bufSize2; i++) dat2[i] = (Math.random() * 2 - 1);
    const rumble = ctx.createBufferSource();
    rumble.buffer = buf2;
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass'; lpf.frequency.value = 80;
    const gainR = ctx.createGain();
    flatGain(gainR, 0.4);
    rumble.connect(lpf); lpf.connect(gainR); gainR.connect(ctx.destination);
    rumble.start(); rumble.stop(end);

  } catch(e) {}
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    triggerEndCelebration();
  } else {
    loadQuestion();
  }
}

function showScore() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('score-screen').classList.remove('hidden');
  document.getElementById('progress-fill').style.width = '100%';

  const total = QUESTIONS.length;
  document.getElementById('score-display').textContent = `${score}/${total}`;

  let msg = '';
  const ratio = score / total;
  if (ratio === 1) msg = "Parfait ! T'es trop fort 🏆";
  else if (ratio >= 0.66) msg = "Pas mal, t'as presque tout bon 👍";
  else if (ratio >= 0.33) msg = "Bof... t'as encore des progrès à faire 😬";
  else msg = "Honteux. T'as rien compris à tes potes 💀";

  document.getElementById('score-msg').textContent = msg;
}

function triggerEndCelebration() {
  document.getElementById('quiz-screen').classList.add('hidden');
  startCelebration(score, QUESTIONS.length);
}

startQuiz();
</script>
